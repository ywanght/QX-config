# ── HTTP Backend ──────────────────────────────────────────
[http_backend]
# BoxJS 后端（默认关闭，启用后访问 http://127.0.0.1:9999）
# 启用方法：将下方 enabled=false 改为 enabled=true，长按风车 > 更新，重启代理
# 文档：https://docs.boxjs.app
https://raw.githubusercontent.com/chavyleung/scripts/master/chavy.box.js, host=boxjs.com, tag=BoxJS, path=^/, enabled=false

# ── 定时任务 ──────────────────────────────────────────────
[task_local]
# 流媒体解锁查询（在策略组图标长按可触发）
event-interaction https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/streaming-ui-check.js, tag=流媒体解锁查询, img-url=checkmark.seal.system, enabled=true

# ── MITM ──────────────────────────────────────────────────
[mitm]
skip_validating_cert = true
force_sni_domain_name = false
# 说明：
#   - 前缀 "-" 表示排除该域名（不做 MITM）
#   - YouTube 相关域名需要 MITM 才能去广告
hostname = -testflight.apple.com, -*.fcbox.com, -*huami.com, -*amemv.com, -*snssdk.com, -www.google.com, *.youtube.com, *.googlevideo.com, www.imxingzhe.com, helper.2bulu.com
