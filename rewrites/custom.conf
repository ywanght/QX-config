# ============================================================
# 自定义复写规则 (Custom Rewrite Rules)
# 作用：针对特定 App 的广告接口进行精细化处理
#       部分广告需要返回合法结构体（不能直接 reject），
#       因此使用脚本修改响应内容
# 说明：两步路开屏广告已在主配置 [rewrite_local] 中处理，
#       此处不再重复
# ============================================================

# ----- 知乎 -----
# 移除信息流广告
^https?:\/\/api\.zhihu\.com\/moments\? url reject-dict
^https?:\/\/api\.zhihu\.com\/v4\/feed\/content\? url reject-dict
# 移除回答中的广告卡片
^https?:\/\/api\.zhihu\.com\/v4\/answers\/\d+\/relevant_info url reject-dict
# 移除开屏广告
^https?:\/\/api\.zhihu\.com\/v3\/launch url reject-dict

# ----- 东方财富 -----
# 拦截广告服务接口（域名级拦截已在 rules/reject.list 中，此处补充 URL 级精确拦截）
^https?:\/\/emdcadvertise\.eastmoney\.com\/infoService\/v2 url reject-dict

# ----- 行者骑行 -----
# 使用脚本清空首页广告列表（直接 reject 会导致接口报错）
^https:\/\/www\.imxingzhe\.com\/api\/v(?:1|4)\/.* url script-response-body https://raw.githubusercontent.com/ywanght/QX-config/main/scripts/xingzhe.js

# ----- 青桔单车 -----
# 使用脚本将广告展示时长归零并过滤广告模块
^https:\/\/htwkop\.xiaojukeji\.com\/gateway\?api=hm\.fa\.homeConfig url script-response-body https://raw.githubusercontent.com/ywanght/QX-config/main/scripts/qingju.js
